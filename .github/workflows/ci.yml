# (저장소 루트가 이 폴더일 때) Expected_Price 하위 프로젝트로 CI
# 동작은 Expected_Price/.github/workflows/ci.yml 과 동일한 '루트 자동 감지'
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve project root
        id: root
        run: |
          if [ -f requirements-research.txt ] && [ -d tests ]; then
            echo "path=." >> $GITHUB_OUTPUT
            echo "Resolved: repository root = project (.)"
          elif [ -f Expected_Price/requirements-research.txt ] && [ -d Expected_Price/tests ]; then
            echo "path=Expected_Price" >> $GITHUB_OUTPUT
            echo "Resolved: project in Expected_Price/"
          else
            echo "::error::requirements-research.txt + tests/ not found in . or Expected_Price/"
            ls -la
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ steps.root.outputs.path }}/requirements-research.txt

      - name: Run CI (scripts/run_ci.py = pip + unittest + JSONL)
        working-directory: ${{ steps.root.outputs.path }}
        run: python scripts/run_ci.py
